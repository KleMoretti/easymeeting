spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:6060}
ws.port=${WS_PORT:6061}
server.servlet.context-path=/api
server.servlet.session.timeout=PT60M
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:15MB}
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/easymeeting?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=HikariPool
spring.datasource.hikari.maximum-pool-size=${MYSQL_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${MYSQL_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.redis.database=${REDIS_DATABASE:0}
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.jedis.pool.max-active=20
spring.redis.jedis.pool.max-wait=-1ms
spring.redis.jedis.pool.max-idle=10
spring.redis.jedis.pool.min-idle=0
spring.redis.timeout=${REDIS_TIMEOUT_MS:2000}

messaging.handle.channel=rabbitmq
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}

project.folder=${PROJECT_FOLDER:D:/@Java/easymeeting}
log.root.level=${LOG_ROOT_LEVEL:debug}
admin.email=${ADMIN_EMAIL:test@qq.com}
app.instance-id=${APP_INSTANCE_ID:${random.uuid}}
meeting.state.repair.enabled=${MEETING_STATE_REPAIR_ENABLED:true}
meeting.state.repair.fixed-delay-ms=${MEETING_STATE_REPAIR_DELAY_MS:60000}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.rabbitMq.enabled=true
management.health.nettyWebSocket.enabled=true
